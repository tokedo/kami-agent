# Builds the SPEC §10 image and proves `kami-agent init` — run-dir layout
# from the example manifest and all four connectivity checks (chain RPC,
# mainnet RPC, provider API, MCP handshake against the bundled pinned
# harness) — passes inside the container. Manual dispatch; run before
# tagging and on packaging changes.

name: docker-smoke

on:
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # init's connectivity check dials this (eth_chainId == 1), so the
      # offline placeholder won't do here: repo secret if set, else a
      # keyless public endpoint.
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || 'https://ethereum-rpc.publicnode.com' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t kami-agent .
      - name: In-container init with live connectivity checks
        # pipefail: the Actions default shell would take tee's exit code and
        # mask an init crash whose earlier stdout still satisfies the greps.
        run: |
          set -o pipefail
          mkdir -p /tmp/run
          cp manifests/example.yaml /tmp/run/manifest.yaml
          docker run --rm -e ANTHROPIC_API_KEY -e MAINNET_RPC_URL \
            -v /tmp/run:/srv/run kami-agent \
            kami-agent init --manifest /srv/run/manifest.yaml --run-dir /srv/run \
            | tee /tmp/init.out
          grep -q "chain RPC ok" /tmp/init.out
          grep -q "mainnet RPC ok" /tmp/init.out
          grep -q "provider API ok" /tmp/init.out
          grep -q "harness ok (kamigotchi-executor" /tmp/init.out
          # printed only after the run_start emit succeeds — asserts init
          # reached the end, not just its connectivity checks
          grep -q "^initialized /srv/run" /tmp/init.out
          test -f /tmp/run/prompts/system.txt
          test -f /tmp/run/config.yaml
      - name: In-container status
        run: |
          set -o pipefail
          docker run --rm -v /tmp/run:/srv/run kami-agent | tee /tmp/status.out
          grep -q '"run_status": "active"' /tmp/status.out
